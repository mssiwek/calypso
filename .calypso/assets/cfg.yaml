# =================================================================
# CALYPSO training configuration for entire hyperparameter study
# DO NOT RUN unless expecting a large number of jobs to be created,
# and a lot of computational resources to be used.
# =================================================================

paths:
  data: "./data/TimeSeries"
  training_root: "./results/" # root directory where training outputs will be saved

run:
  id: "hparam_study"
  mail: "mss931@nyu.edu"

grid_mode: "cartesian"   # or "cartesian"

grid:
  comp: ["M1", "M2", "Mb"]
  hs: [16, 32, 64, 128, 256, 384, 512]
  nl: [1, 2, 3, 4, 5, 6, 7]

fixed:
  nwindows: 1
  norb: 10
  nbins: 100
  log: True
  ld: 64
  num_epochs: 10000
  patience: 1000
  checkpoint_interval: 100
  validate: 1
  eps: 1e-8
  dropout: 0.0
  activation_function: null
  sigma: True
  optimizer: "Adam"
  lr: 1.0e-5
  bs: 5
  lf: "MNL"
  vallf: ["MSE"]
  vallf_weights: [1.0]

slurm:
  partition: "gpu_requeue"
  mem: "16G"
  time: "1-00:00:00"
  gpus: 1
  mail_types: "START,FAIL,END"